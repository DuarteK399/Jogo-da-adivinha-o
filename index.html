<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Jogo de Adivinhação</h1>
        
        <div class="instrucoes">
            <p>Tente adivinhar o número secreto entre <strong>1 e 100</strong>!</p>
            <p>Você tem <strong>10 tentativas</strong> para acertar. Boa sorte! 🍀</p>
        </div>

        <div class="jogo">
            <input 
                type="number" 
                id="palpite" 
                placeholder="Digite seu palpite..." 
                min="1" 
                max="100"
                autofocus
            >
            <button id="btnChutar">Chutar</button>
        </div>

        <p id="mensagem" class="mensagem"></p>
        <p id="tentativas" class="tentativas">Tentativas restantes: 10</p>

        <button id="btnReiniciar" class="btn-reiniciar" style="display: none;">
            Jogar Novamente
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
